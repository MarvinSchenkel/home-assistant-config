---
binary_sensor:
  - name: is_strong_wind
    unique_id: 0f086a65-77a9-4092-8c66-bf00da912261
    # Short debounce on top of the value hysteresis below. The longer
    # "wait until the wind has been calm" cooldown lives in the sunscreen
    # automation, so this stays modest for the other consumers (blinds).
    delay_off:
      minutes: 5
    delay_on:
      minutes: 1
    # Hysteresis: trip ON at the high thresholds, only release once the wind is
    # clearly calm again. In between (the dead-band) the previous state is kept,
    # which stops the sensor oscillating when gusts hover around the threshold.
    state: >
      {% set gust_speed = states("sensor.gw3000a_wind_gust") | float(0) %}
      {% set avg_speed = states("sensor.gw3000a_wind_speed") | float(0) %}
      {% set trip = gust_speed > 19.0
        or avg_speed > 12.0
        or (gust_speed > 15.0 and avg_speed > 7.0) %}
      {% set release = gust_speed < 12.0 and avg_speed < 6.0 %}
      {% if trip %}
        on
      {% elif release %}
        off
      {% else %}
        {{ 'on' if is_state('binary_sensor.is_strong_wind', 'on') else 'off' }}
      {% endif %}
