---
switch:
  - name: doorbell_chime
    unique_id: 5b77820e-a376-4429-9749-e9ab2d23979b
    state: "{{ is_state('select.g4_doorbell_chime_type', 'mechanical') }}"
    turn_on:
      action: select.select_option
      target:
        entity_id: select.g4_doorbell_chime_type
      data:
        option: mechanical
    turn_off:
      action: select.select_option
      target:
        entity_id: select.g4_doorbell_chime_type
      data:
        option: none
