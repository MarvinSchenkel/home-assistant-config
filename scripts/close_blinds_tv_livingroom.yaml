---
alias: close_blinds_tv_livingroom
description: Close both blinds in the TV area of the living room
mode: single
sequence:
  - action: scene.turn_on
    target:
      entity_id: scene.gardendoor_cover_closed
  - action: scene.turn_on
    target:
      entity_id: scene.livingroom_cover_closed
  - action: scene.turn_on
    target:
      entity_id: scene.kitchen_cover_halfclosed
