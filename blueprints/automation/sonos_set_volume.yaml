---
blueprint:
  name: Set volume
  description: >
    Set the Sonos volume automatically based on the music schedules throughout
    the day
  domain: automation
  input:
    sonos:
      name: Sonos
      description: Sonos entity to control
      selector:
        entity:
          integration: sonos
    just_awake_volume:
      name: just_awake_volume
      description: Volume for the just awake schedule
      default: 10
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
    early_morning_volume:
      name: early_morning_volume
      description: Volume for the early morning schedule
      default: 10
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
    morning_volume:
      name: morning_volume
      description: Volume for the morning schedule
      default: 10
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
    day_volume:
      name: day_volume
      description: Volume for the day schedule
      default: 10
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
    evening_volume:
      name: evening_volume
      description: Volume for the evening schedule
      default: 10
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
    custom_conditions:
      name: Custom conditions
      default: []
      description: >
        A list of custom condititions that also have to be met before turning on
        the media player
    custom_state_triggers:
      name: Customer state triggers
      default: []
      description: >-
        A list of entities that will be used as additional state triggers for the
         automation
    mute_conditions:
      name: Mute conditions
      default:
        - '{{ false }}'
      description: >
        A list of conditions that will mute the target player when met

mode: restart
max_exceeded: silent

variables:
  just_awake_volume: !input just_awake_volume
  early_morning_volume: !input early_morning_volume
  morning_volume: !input morning_volume
  day_volume: !input day_volume
  evening_volume: !input evening_volume
  sonos: !input sonos

  mass_entity_suffix: >
    {{ "" if is_state("media_player.mass_all_devices", "unavailable") else "" }}
  mass_entity: "{{ sonos + mass_entity_suffix }}"
  music_schedule: >
    {{ states('input_select.current_music_schedule') }}

trigger:
  - trigger: state
    entity_id:
      - input_select.current_music_schedule
      - input_boolean.setting_automatic_music

  - trigger: state
    entity_id: !input sonos
    to: "playing"

  - trigger: state
    entity_id: !input custom_state_triggers

condition:
  - alias: "Only control the volume when we are automating the music"
    condition: state
    entity_id: input_boolean.setting_automatic_music
    state: "on"
  - condition: and
    conditions: !input custom_conditions

action:
  - variables:
      schedule_volume: >
        {% if music_schedule == "just_awake" %}
          {{ just_awake_volume }}
        {% elif music_schedule == "early_morning" %}
          {{ early_morning_volume }}
        {% elif music_schedule == "morning" %}
          {{ morning_volume }}
        {% elif music_schedule == "day" %}
          {{ day_volume }}
        {% elif music_schedule == "evening" %}
          {{ evening_volume }}
        {% else %}
          0
        {% endif %}

  - choose:
      - conditions:
          - condition: and
            conditions: !input mute_conditions
        sequence:
          - if: '{{ "is_volume_muted" in states[mass_entity].attributes }}'
            then:
              - action: media_player.volume_mute
                target:
                  entity_id: "{{ mass_entity }}"
                data:
                  is_volume_muted: true
            else:
              - action: media_player.volume_set
                target:
                  entity_id: "{{ mass_entity }}"
                data:
                  volume_level: 0

      - conditions: "{{ schedule_volume | int > 0 }}"
        sequence:
          - if: '{{ "is_volume_muted" in states[mass_entity].attributes }}'
            then:
              - action: media_player.volume_mute
                target:
                  entity_id: "{{ mass_entity }}"
                data:
                  is_volume_muted: false

          - action: media_player.volume_set
            target:
              entity_id: "{{ mass_entity }}"
            data:
              volume_level: "{{ schedule_volume | int / 100.0 }}"
