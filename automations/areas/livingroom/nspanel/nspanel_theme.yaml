---
description: >
  Automatically set the theme on the NS Panel
alias: areas_livingroom_nspanel_theme
id: c7e57828-e414-4247-b354-e17728544e5b

trigger:
  - trigger: homeassistant
    event: start

  - trigger: event
    event_type: automation_reloaded

  - trigger: state
    entity_id:
      - binary_sensor.livingroom_is_dark

action:
  - choose:
      - conditions:
          - condition: state
            entity_id:
              - binary_sensor.livingroom_is_dark
            state: "on"
        sequence:
          - alias: "Turn on dark mode"
            action: browser_mod.set_theme
            target:
              device_id: 3592045e4bb5ae83ef15433835cd13d2
            data:
              theme: nspanel
              dark: dark

    default:
      - alias: "Turn on light mode"
        action: browser_mod.set_theme
        target:
          device_id: 3592045e4bb5ae83ef15433835cd13d2
        data:
          theme: nspanel
          dark: light
