---
alias: areas_bathroom_climate
description: Manages the climate in our bathroom
id: 186b9beb-d46f-4eea-9204-f8ffc5743a6d
mode: queued

trigger:
  - trigger: homeassistant
    event: start

  - trigger: event
    event_type: automation_reloaded

  - trigger: state
    entity_id:
      - input_select.bathroom_room_mode
      - binary_sensor.everyone_left_home
      - binary_sensor.house_mode_everyone_at_home_working
      - binary_sensor.house_mode_someone_just_awake
    from: ~

  - trigger: state
    entity_id:
      - climate.bathroom_floor
    from: unavailable

  - trigger: time
    at:
      - "06:30:00"
      - "08:00:00"
      - "17:00:00"
      - "21:00:00"

variables:
  anchors:
    - &target
      target:
        entity_id: climate.bathroom_floor

    - &turn_on
      <<: *target
      alias: "Turn on heating"
      action: climate.set_hvac_mode
      data:
        hvac_mode: "heat"

    - &turn_down
      <<: *target
      alias: "Turn down small bedroom climate"
      action: climate.set_temperature
      data:
        temperature: 15.0

    - &turn_up
      <<: *target
      alias: "Turn down small bedroom climate"
      action: climate.set_temperature
      data:
        temperature: 21.0

action:
  - choose:
      - conditions:
          - alias: "When the house is in away mode"
            condition: state
            entity_id: binary_sensor.everyone_left_home
            state: "on"
        sequence:
          - *turn_down

      - alias: "Turn up the heating in the morning"
        conditions:
          - condition: state
            entity_id: binary_sensor.house_mode_someone_just_awake
            state: "on"
          - condition: time
            after: "06:30:00"
            before: "08:00:00"
        sequence:
          - *turn_on
          - *turn_up

      - alias: "Turn up the heating in the evening"
        conditions:
          - condition: state
            entity_id: input_select.bathroom_room_mode
            state: "Wakker"
          - condition: time
            after: "17:00:00"
            before: "21:00:00"
        sequence:
          - *turn_on
          - *turn_up

    default:
      - *turn_down
