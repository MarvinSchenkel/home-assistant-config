---
description: >
  Automatically select the light schedule that suits the situation,
  time of day, or outdoor light conditions (Ecowitt lux sensor)
alias: house_light_schedule
id: 5840c714-45b1-4f4a-b805-023a268d0813
mode: restart

trigger:
  - platform: state
    entity_id:
      - input_select.livingroom_room_mode

  - platform: time
    at:
      - "07:00:00"
      - "08:00:00"
      - "10:00:00"
      - "17:00:00"
      - "20:00:00"
      - "22:00:00"
      - "00:00:00"

  - platform: homeassistant
    event: start

  - platform: event
    event_type: automation_reloaded

  - platform: numeric_state
    id: "lux_below_5000"
    entity_id: sensor.gw3000a_solar_lux
    below: 5000
    for:
      minutes: 10

  - platform: numeric_state
    id: "lux_below_1000"
    entity_id: sensor.gw3000a_solar_lux
    below: 1000
    for:
      minutes: 10

  - platform: numeric_state
    id: "lux_above_8000"
    entity_id: sensor.gw3000a_solar_lux
    above: 8000
    for:
      minutes: 10

variables:
  anchors:
    - &select_schedule
      alias: "Select the schedule"
      service: input_select.select_option
      target:
        entity_id: input_select.current_light_schedule
    - &select_schedule_dynamic
      alias: "Select the schedule"
      service: input_select.select_option
      target:
        entity_id: input_select.current_light_schedule_dynamic

action:
  - choose:
      # Lux-based overrides: only during daytime with manual lights off
      - conditions:
          - condition: trigger
            id: "lux_below_1000"
          - condition: state
            entity_id: sun.sun
            state: "above_horizon"
          - condition: state
            entity_id: input_boolean.setting_manual_lights
            state: "off"
        sequence:
          - <<: *select_schedule
            data:
              option: "lezen"

      - conditions:
          - condition: trigger
            id: "lux_below_5000"
          - condition: state
            entity_id: sun.sun
            state: "above_horizon"
          - condition: state
            entity_id: input_boolean.setting_manual_lights
            state: "off"
          - condition: state
            entity_id: input_select.current_light_schedule
            state:
              - "energie"
              - "concentreren"
        sequence:
          - <<: *select_schedule
            data:
              option: "ontspannen"

      - conditions:
          - condition: trigger
            id: "lux_above_8000"
          - condition: state
            entity_id: sun.sun
            state: "above_horizon"
          - condition: state
            entity_id: input_boolean.setting_manual_lights
            state: "off"
        sequence:
          - <<: *select_schedule
            data:
              option: "{{ states('input_select.current_light_schedule_dynamic') }}"

      # Time/mode-based schedule
      - conditions:
          - condition: state
            entity_id:
              - input_select.livingroom_room_mode
            state: "Slaap"
        sequence:
          - <<: *select_schedule
            data:
              option: "nachtlampje"
          - <<: *select_schedule_dynamic
            data:
              option: "snachts"

      - conditions:
          - condition: time
            alias: "It is after 10pm"
            after: "22:00:00"
        sequence:
          - <<: *select_schedule
            data:
              option: "rusten"
          - <<: *select_schedule_dynamic
            data:
              option: "slaperig"

      - conditions:
          - condition: time
            alias: "It is after 8pm"
            after: "20:00:00"
        sequence:
          - <<: *select_schedule
            data:
              option: "ontspannen"
          - <<: *select_schedule_dynamic
            data:
              option: "ontladen"

      - conditions:
          - condition: time
            alias: "It is after 5pm"
            after: "17:00:00"
        sequence:
          - <<: *select_schedule
            data:
              option: "lezen"
          - <<: *select_schedule_dynamic
            data:
              option: "sprookjesboek"

      - conditions:
          - condition: time
            alias: "It is after 10am"
            after: "10:00:00"
        sequence:
          - <<: *select_schedule
            data:
              option: "concentreren"
          - <<: *select_schedule_dynamic
            data:
              option: "stralen"

      - conditions:
          - condition: time
            alias: "It is after 8am"
            after: "08:00:00"
        sequence:
          - <<: *select_schedule
            data:
              option: "energie"
          - <<: *select_schedule_dynamic
            data:
              option: "opkomen"

      - conditions:
          - condition: time
            alias: "It is after 7am"
            after: "07:00:00"
        sequence:
          - <<: *select_schedule
            data:
              option: "ontspannen"
          - <<: *select_schedule_dynamic
            data:
              option: "ontladen"

    default:
      - <<: *select_schedule
        data:
          option: "rusten"
