---
# The recorder component is storing details in a database which
# then are handled by the history component.
#
# https://www.home-assistant.io/integrations/recorder/
#
recorder:
  # The number of days of history to keep in the recorder database
  purge_keep_days: 3

  # Disable auto purging, I'm doing this using automations instead
  auto_purge: false

  exclude:
    domains:
      - button
      - update
      - device_tracker
    entity_globs:
      - "*espresense_mancave*"
      - "sensor.double_take_*"
      - "*zigbee2mqtt_bridge*"
      - "sensor.nspanel_*_infobar"
  include:
    entities:
      - device_tracker.marvins_iphone_13_nieuw
      - device_tracker.unifi_laura
